[package]
name = "stellar"
version = "0.1.0"
edition = "2024"

[dependencies]
csv = "1.3.1"
itertools = "0.14.0"
rand = "0.10.0"
rand_distr = "0.6.0"
rayon = "1.10.0"
plotters = {version= "0.3", features = ["full_palette"] }
# blas-src = { version = "0.8", features = ["accelerate"] }
blas-src = { version = "0.8", features = ["openblas"] }
# ndarray = "0.17.2"
# ndarray = "0.17.2"

[dev-dependencies]
criterion = "0.5"
# ndarray = "0.17.2"
ndarray = "0.15"
ndarray-linalg = { version = "0.16", features = ["openblas-static"] }
linfa-linalg = "0.2.1"

[[bench]]
name = "lq_bench"
sample_size = 10
harness = false

[[bench]]
name = "matrix_benchmark"
sample_size = 10
harness = false

[profile.release]
strip = true
lto = true

[profile.bench]
opt-level = 3
lto = true
codegen-units = 1
